ñ<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  background: #121212;
  color: white;
  font-family: Arial;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.cover {
  width: 100%;
  height: 200px;
  background: linear-gradient(45deg, #1db954, #191414);
  border-radius: 20px;
  margin-bottom: 15px;
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
  100% { filter: brightness(1); }
}

.controls button {
  background: #1db954;
  border: none;
  padding: 10px;
  margin: 5px;
  border-radius: 50%;
  font-size: 18px;
}

ul {
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
  <div class="cover"></div>

  <h2 id="title">Sin música</h2>

  <audio id="audio"></audio>

  <input type="file" id="fileInput" multiple accept="audio/*">

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
  </div>

  <input type="range" id="progress">

  <h3>Playlist</h3>
  <ul id="playlist"></ul>
</div>

<script>
let songs = JSON.parse(localStorage.getItem("songs")) || [];
let index = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const playlist = document.getElementById("playlist");

// Guardar en localStorage
function save(){
  localStorage.setItem("songs", JSON.stringify(songs));
}

// Cargar UI
function render(){
  playlist.innerHTML = "";
  songs.forEach((s, i) => {
    const li = document.createElement("li");
    li.textContent = s.name;
    li.onclick = () => {
      index = i;
      loadSong();
      play();
    };
    playlist.appendChild(li);
  });
}

// Cargar archivos
fileInput.addEventListener("change", e => {
  Array.from(e.target.files).forEach(file => {
    const url = URL.createObjectURL(file);
    songs.push({name: file.name, src: url});
  });

  save();
  render();

  if(songs.length > 0){
    loadSong();
  }
});

function loadSong(){
  audio.src = songs[index].src;
  title.textContent = songs[index].name;
}

function play(){ audio.play(); }
function pause(){ audio.pause(); }

function next(){
  index = (index + 1) % songs.length;
  loadSong();
  play();
}

function prev(){
  index = (index - 1 + songs.length) % songs.length;
  loadSong();
  play();
}

audio.addEventListener("ended", next);

// progreso
audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

progress.addEventListener("input", e => {
  audio.currentTime = (e.target.value / 100) * audio.duration;
});

// iniciar
render();
if(songs.length > 0) loadSong();
</script>

</body>
</html>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
<button onclick="clearPlaylist()">🗑 Limpiar</button>
